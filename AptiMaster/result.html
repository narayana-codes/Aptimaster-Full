<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Results</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#eaf3ff,#ffffff);
    padding:20px;
}

.result-card{
    width:100%;
    max-width:650px;
    background:#fff;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    text-align:center;
}

.result-card h1{
    color:#0d6efd;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

.score-box{
    background:#f0f7ff;
    border:2px solid #d7e8ff;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

.score{
    font-size:42px;
    font-weight:bold;
    color:#0d6efd;
}

.accuracy{
    margin-top:10px;
    color:#555;
    font-size:18px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:25px;
}

.stat{
    background:#f8fbff;
    border:1px solid #dcecff;
    border-radius:12px;
    padding:18px 10px;
}

.stat h3{
    color:#0d6efd;
    margin-bottom:6px;
    font-size:15px;
}

.stat p{
    font-size:24px;
    font-weight:bold;
    color:#333;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
}

button{
    padding:16px;
    border:none;
    border-radius:12px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.view-btn{
    background:#0d6efd;
    color:white;
}

.view-btn:hover{
    background:#0b5ed7;
}

.retry-btn{
    background:white;
    color:#0d6efd;
    border:2px solid #0d6efd;
}

.retry-btn:hover{
    background:#0d6efd;
    color:white;
}

.home-btn{
    background:#eef5ff;
    color:#0d6efd;
}

.home-btn:hover{
    background:#dceaff;
}

@media(max-width:600px){

.result-card{
    padding:20px;
}

.stats{
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.score{
    font-size:36px;
}

.result-card h1{
    font-size:30px;
}

.subtitle{
    font-size:16px;
}

#attemptNo{
    display:none;
}

}
.progress-container{
    width:100%;
    height:15px;
    background:#dce8ff;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#0d6efd;
    transition:1s;
}

#performance{
    color:#0d6efd;
    font-size:24px;
    margin-bottom:10px;
}
#attemptNo{
    color:#0d6efd;
    font-size:20px;
    margin-bottom:15px;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="result-card">

    <h1>🎉 Quiz Completed</h1>
    <p class="subtitle">Here is your performance summary</p>
     <h3 id="attemptNo"></h3>
    <div class="score-box">

    <h2 id="performance"></h2>

    <div class="score" id="score">0 / 0</div>

    <div class="accuracy" id="accuracy">
        0% Accuracy
    </div>

    <div class="progress-container">
        <div class="progress-bar"
             id="progressBar">
        </div>
    </div>

</div>

    <div class="stats">

    <div class="stat">
        <h3>⏱ Time Taken</h3>
        <p id="timeTaken">0m 0s</p>
    </div>

    <div class="stat">
        <h3>📝 Attempted</h3>
        <p id="attempted">0</p>
    </div>

    <div class="stat">
        <h3>✅ Correct</h3>
        <p id="correct">0</p>
    </div>

    <div class="stat">
        <h3>❌ Wrong</h3>
        <p id="wrong">0</p>
    </div>

</div>
    <div class="buttons">

        <button class="view-btn" id="viewSolutions">
            View Solutions
        </button>

        <button class="retry-btn" id="retryQuiz">
            Retry Quiz
        </button>

        <button class="home-btn" onclick="location.href='http://127.0.0.1:5500/AptiMaster/index.html'">
            Go Home
        </button>
        <button class="home-btn" onclick="location.href='http://127.0.0.1:5500/AptiMaster/index.html'">
    🚪 Logout
</button>


    </div>

</div>

<script>

/*
Quiz page nunchi save cheyyali:

localStorage.setItem("score", score);
localStorage.setItem("totalQuestions", questions.length);

localStorage.setItem("startTime", startTime);
localStorage.setItem("endTime", Date.now());
*/

// Score Data
let score = Number(localStorage.getItem("score")) || 0;
let totalQuestions =
Number(localStorage.getItem("totalQuestions")) || 10;

let correct = score;
let wrong = totalQuestions - score;
let attempted =
Number(localStorage.getItem("answeredQuestions")) || 0;

let accuracy =
Math.round((score / totalQuestions) * 100) || 0;

// Score Display
document.getElementById("score").innerText =
`${score} / ${totalQuestions}`;

document.getElementById("accuracy").innerText =
`${accuracy}% Accuracy`;
let message = "";

if (accuracy >= 90) {
    message = "🏆 Excellent";
}
else if (accuracy >= 75) {
    message = "⭐ Great Job";
}
else if (accuracy >= 50) {
    message = "👍 Good Performance";
}
else {
    message = "📚 Keep Practicing";
}

document.getElementById("performance").innerText = message;
let attempts =
Number(localStorage.getItem("attempts")) || 1;

document.getElementById("attemptNo").innerText =
`📊 Attempt #${attempts}`;

document.getElementById("progressBar").style.width =
accuracy + "%";

document.getElementById("correct").innerText = correct;
document.getElementById("wrong").innerText = wrong;
document.getElementById("attempted").innerText = attempted;
// Time Calculation
let startTime =
Number(localStorage.getItem("startTime"));

let endTime =
Number(localStorage.getItem("endTime"));

if(startTime && endTime){

    let totalSeconds =
    Math.floor((endTime - startTime)/1000);

    let minutes =
    Math.floor(totalSeconds/60);

    let seconds =
    totalSeconds % 60;

    document.getElementById("timeTaken").innerText =
    `${minutes}m ${seconds}s`;

}

// Buttons

document.getElementById("viewSolutions")
.addEventListener("click",()=>{

    window.location.href="solutions.html";

});

document.getElementById("retryQuiz")
.addEventListener("click",()=>{

    window.location.href="quiz.html";

});

document.getElementById("retryQuiz")
.addEventListener("click", () => {

    localStorage.removeItem("startTime");
    localStorage.removeItem("endTime");
    localStorage.removeItem("score");

    window.location.href = "quiz.html";

});
document.getElementById("logoutBtn")
.addEventListener("click", () => {

    localStorage.clear();

   

    window.location.href = "login.html";

});

</script>

</body>
</html>
